name: Loopy Loyalty Notifier

on:
  schedule:
    # 08:00 SAST daily (06:00 UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:   # Allow manual trigger

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run Loopy notifier
        env:
          LL_USERNAME:      ${{ secrets.LL_USERNAME }}
          LL_PASSWORD:      ${{ secrets.LL_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python loopy_notifier.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/loopy_state.json state/run_log.json
          git diff --cached --quiet || git commit -m "chore: update loopy notifier state [skip ci]"
          git push origin $(git rev-parse --abbrev-ref HEAD) || echo "Push failed or no changes to push"
