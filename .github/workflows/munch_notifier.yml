name: Munch Account Notifier

on:
  schedule:
    # Every hour, 06:00–16:00 SAST (= 04:00–14:00 UTC), plus a 16:30 SAST run
    - cron: "0 4-14 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

# Prevent concurrent runs — ensures two runs never read the same state
# simultaneously and send duplicate notifications.
concurrency:
  group: munch-notifier
  cancel-in-progress: false   # queue the next run, don't cancel it

permissions:
  contents: write      # Needed to commit state file back to repo

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run notifier
        env:
          MUNCH_EMAIL:          ${{ secrets.MUNCH_EMAIL }}
          MUNCH_PASSWORD:       ${{ secrets.MUNCH_PASSWORD }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
        run: python notifier.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/notified_transactions.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update notifier state [skip ci]"
            git pull --rebase origin main
            git push
          fi
